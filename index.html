<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo das Palavras</title>
    <link rel="stylesheet" href="index.css">
</head>
<body id="body">

    <div class="background-animation"></div>

    <div class="container">

        <h1>Jogo das Palavras</h1>
        <p class="subtitle">Descubra a palavra antes dos erros acabarem!</p>

        <!-- Tela Inicial -->
        <div id="setup-container">
            <input 
                onkeydown="iniciarJogo(event)" 
                type="text" 
                id="nickname-input" 
                placeholder="Digite seu nickname..."
            >
        </div>

        <!-- Tela do Jogo -->
        <div id="game-container" class="hidden">

            <h2 id="player-display"></h2>

            <!-- Dica -->
            <div class="hint-box">
                💡 Dica: <span id="hint-display">...</span>
            </div>

            <!-- Palavra -->
            <div id="word-display" class="word-slots"></div>

            <!-- Input -->
            <input 
                onkeydown="tentarLetra(event)" 
                type="text"
                id="letter-input" 
                maxlength="1" 
                placeholder="?"
            >

            <!-- Status -->
            <div class="status-info">
                <p>Erros: <span id="error-count">0</span> / 4</p>
                <p id="game-message"></p>
            </div>

            <button id="reset-btn" class="hidden" onclick="reiniciarJogo()">
                Jogar Novamente
            </button>
        </div>

        <footer>
            Desenvolvido por <strong>Fernanda Araújo</strong> 
        </footer>

    </div>

    <script src="index.js"></script>
</body>
</html>
